<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <title>AVTR</title>
</head>

<body>

    <header class="header">
        <div class="container header-inner">
            <button class="btn-menu">
                <img class="menu-img" src="images/btn-icon.svg" alt="">
            </button>
            <a href="#" class="logo">
                <img src="images/logo.svg" alt="" class="logo-img">
            </a>
            <ul class="social-list">
                <li class="social-item">
                    <a href="#" class="social-link">
                        <img src="images/twitter.svg" alt="" class="social-img">
                    </a>
                </li>
                <li class="social-item">
                    <a href="#" class="social-link">
                        <img src="images/google.svg" alt="" class="social-img">
                    </a>
                </li>
                <li class="social-item">
                    <a href="#" class="social-link">
                        <img src="images/facebook.svg" alt="" class="social-img">
                    </a>
                </li>
            </ul>
        </div>
    </header>
    <main class="main">

       <section class="top">
        <div class="top-content">
            <h1 class="top-title">The VISION AVTR</h1>
            <p class="top-text">Inspered by the future</p>
            <img src="images/mercedes-logo.svg" alt="" class="top-img">
        </div>
       </section>
       <div class="bg">
        <div class="container">
        <section class="concept">
            <h2 class="concept-title">CONCEPT</h2>
            <p class="concept-text">Електромобільність у гармонії з людиною та природою. Екологічна технологія органічних акумуляторів та продумана операційна стратегія концепт-кара VISION AVTR.</p>
           <img class="concept-img" src="images/concept.jpg" alt="">
        </section>
        </div>
       </div>
       
    </main>
    <footer class="footer">

    </footer>


</body>

</html>
